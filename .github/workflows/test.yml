name: Test

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ matrix.python }}

      - name: Run tests
        run: uv run python tests/test_concepts.py

      - name: Build package
        run: uv build

      - name: Verify imports
        run: uv run python -c "from groundhog import *; print('All imports OK')"

      - name: Test CLI help
        run: uv run groundhog --help

      - name: Test CLI backends
        run: uv run groundhog backends

      - name: Test init-mock
        run: |
          uv run groundhog init-mock --script /tmp/test_mock
          python -c "import ast; ast.parse(open('/tmp/test_mock/task.py').read()); print('mock template OK')"
        shell: bash

      - name: Test new strategy
        run: |
          uv run groundhog new strategy /tmp/test_strat.py
          python -c "import ast; ast.parse(open('/tmp/test_strat.py').read()); print('strategy template OK')"
        shell: bash

      - name: Test new backend
        run: |
          uv run groundhog new backend /tmp/test_backend.py
          python -c "import ast; ast.parse(open('/tmp/test_backend.py').read()); print('backend template OK')"
        shell: bash
